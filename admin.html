<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jahonnoma | Админ бошқарув панели</title>
    <style>
        /* ДИЗАЙН ҚИСМИ */
        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            background: linear-gradient(135deg, #2c3e50, #4ca1af); 
            margin: 0; padding: 20px; color: #fff;
        }
        .login-box { 
            max-width: 350px; margin: 100px auto; background: #fff; 
            padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); 
            text-align: center; color: #2c3e50;
        }
        #admin-panel { display: none; max-width: 1000px; margin: auto; }
        
        .header-panel { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        
        .admin-section { 
            background: rgba(255, 255, 255, 0.95); padding: 25px; 
            margin: 20px 0; border-radius: 12px; border-left: 8px solid #f1c40f; 
            color: #2c3e50; box-shadow: 0 5px 15px rgba(0,0,0,0.2); 
        }
        
        h3 { margin-top: 0; border-bottom: 1px solid #ddd; padding-bottom: 10px; color: #2c3e50; }
        input, textarea { width: 100%; margin: 10px 0; padding: 12px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 16px; }
        
        button { 
            background-color: #2c3e50; color: white; border: none; 
            padding: 12px 25px; border-radius: 5px; cursor: pointer; 
            font-weight: bold; transition: 0.3s; margin-top: 10px;
        }
        button:hover { background-color: #f1c40f; color: #000; }
        .logout-btn { background-color: #e74c3c; padding: 10px 20px; }
        
        /* Мобил дизайн */
        @media (max-width: 768px) {
            .admin-section { padding: 15px; }
            h1 { font-size: 20px; }
        }
    </style>
</head>
<body>

<div id="login-form" class="login-box">
    <h2>Jahonnoma</h2>
    <p>Админ панелга кириш</p>
    <input type="password" id="password" placeholder="Паролни киритинг">
    <button onclick="checkPassword()">Кириш</button>
    <br><br>
    <a href="index.html" style="color:#2c3e50; text-decoration: none;">← Сайтга қайтиш</a>
</div>

<div id="admin-panel">
    <div class="header-panel">
        <h1>Админ бошқарув панели</h1>
        <button class="logout-btn" onclick="logout()">Чиқиш</button>
    </div>
    
    <div class="admin-section">
        <h3>1. Мақола қўшиш</h3>
        <input type="text" id="artTitle" placeholder="Мақола сарлавҳаси">
        <textarea id="artDesc" rows="3" placeholder="Қисқача мазмуни (Карточка учун)"></textarea>
        <textarea id="artFull" rows="6" placeholder="Тўлиқ мақола матни"></textarea>
        <button onclick="saveData('articles', {title: 'artTitle', desc: 'artDesc', content: 'artFull'})">Мақолани чоп этиш</button>
    </div>

    <div class="admin-section">
        <h3>2. Китоб юклаш (PDF/Word)</h3>
        <input type="text" id="bookTitle" placeholder="Китоб номи">
        <input type="file" id="bookFile">
        <p style="font-size: 12px; color: gray;">*Файл номи базада сақланади</p>
        <button onclick="saveData('books', {title: 'bookTitle'})">Китобни қўшиш</button>
    </div>

    <div class="admin-section">
        <h3>3. YouTube видеоси</h3>
        <input type="text" id="videoTitle" placeholder="Видео сарлавҳаси">
        <input type="text" id="videoLink" placeholder="YouTube Embed коди (силкаси)">
        <button onclick="saveData('videos', {title: 'videoTitle', link: 'videoLink'})">Видеони қўшиш</button>
    </div>

    <div class="admin-section">
        <h3>4. Фотоальбом</h3>
        <input type="text" id="photoTitle" placeholder="Расм ёки альбом номи">
        <input type="file" id="photoFile" multiple>
        <button onclick="saveData('gallery', {title: 'photoTitle'})">Расмни юбориш</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";
    import { getDatabase, ref, set, push } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-database.js";

    // Сизнинг Firebase конфигингиз
    const firebaseConfig = {
        apiKey: "AIzaSyD0FJPkdeqjPGUX5mryf9encZuWesHV3eY",
        authDomain: "jahonnoma.firebaseapp.com",
        databaseURL: "https://jahonnoma-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "jahonnoma",
        storageBucket: "jahonnoma.firebasestorage.app",
        messagingSenderId: "943940674297",
        appId: "1:943940674297:web:3b1146eff9577f3025f828"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // ПАРОЛЬ ТЕКШИРИШ
    window.checkPassword = function() {
        const pass = document.getElementById('password').value;
        if (pass === "2026") {
            document.getElementById('login-form').style.display = 'none';
            document.getElementById('admin-panel').style.display = 'block';
        } else {
            alert("Парол хато! Қайтадан уриниб кўринг.");
        }
    };

    // ЧИҚИШ
    window.logout = function() {
        location.reload();
    };

    // МАЪЛУМОТНИ БАЗАГА САҚЛАШ (Умумий функция)
    window.saveData = function(path, fields) {
        const data = {};
        let isEmpty = false;

        for (let key in fields) {
            const val = document.getElementById(fields[key]).value;
            if (!val) isEmpty = true;
            data[key] = val;
        }

        if (isEmpty) {
            alert("Илтимос, барча майдонларни тўлдиринг!");
            return;
        }

        data.date = new Date().toLocaleString();

        const newPostRef = push(ref(db, path));
        set(newPostRef, data)
            .then(() => {
                alert("Муваффақиятли сақланди!");
                // Майдонларни тозалаш
                for (let key in fields) { document.getElementById(fields[key]).value = ""; }
            })
            .catch((error) => alert("Хатолик: " + error.message));
    };
</script>

</body>
</html>
